name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kit
          POSTGRES_PASSWORD: kit
          POSTGRES_DB: kit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://kit:kit@localhost:5432/kit?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/app/package-lock.json

      - name: Build frontend (required by //go:embed)
        run: |
          cd web/app
          npm ci
          npm run build

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted. Run 'go fmt ./...' to fix:"
            gofmt -d .
            exit 1
          fi

      - name: Lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.8.0
          golangci-lint run

      - name: Test
        run: |
          go mod tidy
          go vet ./...
          go test -v -race -cover ./...

      - name: Build
        run: make build
