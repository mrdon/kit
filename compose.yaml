services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: kit
      POSTGRES_USER: kit
      POSTGRES_DB: kit
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5488}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kit"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
