{{ define "reveal.html" }}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ .Title }}</title>
<link rel="stylesheet" href="{{ .StaticBase }}/vault.css">
</head>
<body>
<main id="vault-app" data-page="reveal" data-api-base="{{ .APIBase }}" data-static-base="{{ .StaticBase }}" data-tenant-slug="{{ .TenantSlug }}" data-entry-id="{{ .EntryID }}">
<h1>Reveal secret</h1>
<noscript>This page requires JavaScript.</noscript>
<section id="unlock-prompt" hidden>
  <h2>Unlock your vault first</h2>
  <form id="unlock-form" autocomplete="off">
    <label>Master password
      <input type="password" name="master_password" autocomplete="current-password" required>
    </label>
    <button type="submit">Unlock</button>
    <p id="unlock-status" role="status"></p>
  </form>
</section>
<section id="reveal-area" hidden>
  <h2 id="entry-title"></h2>
  <p><strong>Username:</strong> <span id="entry-username"></span></p>
  <p><strong>URL:</strong> <a id="entry-url" target="_blank" rel="noopener"></a></p>
  <p><strong>Password:</strong> <code id="entry-password" class="hidden">•••••</code>
    <button type="button" id="show-password">Show</button>
    <button type="button" id="copy-password">Copy</button>
    <span id="copy-status" role="status"></span>
  </p>
  <section id="entry-totp" hidden>
    <p><strong>2FA code:</strong>
      <code id="totp-code">••• •••</code>
      <button type="button" id="copy-totp">Copy</button>
      <small id="totp-countdown" aria-live="polite"></small>
    </p>
  </section>
  <details id="entry-notes-section" hidden>
    <summary>Notes</summary>
    <pre id="entry-notes"></pre>
  </details>

  <section id="visibility-section">
    <h3>Who can see this</h3>
    <div id="visibility-display"></div>
    <button type="button" id="edit-visibility-button">Edit</button>
    <form id="visibility-form" hidden autocomplete="off">
      <label>Owning role
        <select name="role_id" id="visibility-role-selector" required>
          <option value="" disabled selected>Loading roles…</option>
        </select>
      </label>
      <button type="submit">Save</button>
      <button type="button" id="cancel-visibility-edit">Cancel</button>
      <p id="visibility-status" role="status"></p>
    </form>
  </section>
</section>
<p id="status" role="status"></p>
</main>
<script type="module" src="{{ .StaticBase }}/vault.js"></script>
</body>
</html>
{{ end }}
